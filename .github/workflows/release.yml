```yaml
name: Release
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Source tag/branch to build (e.g. v1.1.5)"
        required: true
        default: main

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: "--target universal-apple-darwin"
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout private source
        uses: actions/checkout@v4
        with:
          repository: SilviusSpark/NyayaLekha
          ref: ${{ github.event.inputs.ref }}
          token: ${{ secrets.SOURCE_REPO_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install frontend dependencies
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}            # publishes to THIS (public) repo
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.event.inputs.ref }}
          releaseName: "NyayaLekha ${{ github.event.inputs.ref }}"
          releaseBody: "Automated release. The app will auto-update to this version."
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
```
